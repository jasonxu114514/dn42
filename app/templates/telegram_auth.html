<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Authenticate with Kioubit.dn42</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="/static/kioubit-auth-button.js"></script>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="main">
    <div id="ui" class="card center-card">
      <h1>Telegram Verification</h1>
      <p class="muted">Verify your dn42 ASN to link it with your Telegram account.</p>
      <kioubit-auth-btn return="{{ return_url }}" token="{{ token }}"></kioubit-auth-btn>
    </div>
    <div id="loader" class="card center-card" style="display:none">
      <p>Sending data back to the bot…</p>
    </div>
  </main>
  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('params')) {
      document.getElementById('ui').style.display = 'none';
      document.getElementById('loader').style.display = 'block';
      const result = {};
      urlParams.forEach((value, key) => result[key] = value);
      tg.sendData(JSON.stringify(result));
    }
  </script>
</body>
</html>
