{% extends "base.html" %}
{% block content %}
{% set path = request.url.path %}
<div class="admin-shell">
  <aside class="sidebar">
    <span class="sidebar-label">Overview</span>
    <a href="/admin" class="{{ 'active' if path == '/admin' else '' }}">Dashboard</a>
    <span class="sidebar-label">Manage</span>
    <a href="/admin/agents" class="{{ 'active' if path.startswith('/admin/agents') else '' }}">PoPs</a>
    <a href="/admin/peers" class="{{ 'active' if path.startswith('/admin/peers') else '' }}">Peerings</a>
    <a href="/admin/users" class="{{ 'active' if path.startswith('/admin/users') else '' }}">Members</a>
    <span class="sidebar-label">Audit</span>
    <a href="/admin/lg-log" class="{{ 'active' if path.startswith('/admin/lg-log') else '' }}">Query log</a>
  </aside>
  <div class="admin-content">
    {% block admin %}{% endblock %}
  </div>
</div>
{% endblock %}
