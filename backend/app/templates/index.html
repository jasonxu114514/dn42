{% extends "base.html" %}
{% block content %}
<section class="panel">
  <h1>Looking Glass</h1>
  <form method="post" action="/lg" class="grid-form">
    <label>Agent
      <select name="agent_id">
        {% for agent in agents %}
          <option value="{{ agent.id }}">{{ agent.name }}{% if agent.location %} - {{ agent.location }}{% endif %}</option>
        {% endfor %}
      </select>
    </label>
    <label>Query
      <select name="query_type">
        <option value="ping">ping</option>
        <option value="trace">traceroute</option>
        <option value="route">route</option>
        <option value="status">status</option>
      </select>
    </label>
    <label>Target
      <input name="target" placeholder="IP, hostname, or prefix — e.g. 172.20.0.1, wiki.dn42, 1.1.1.0/24">
    </label>
    <button type="submit">Run</button>
  </form>
  {% if lg_result %}
    <pre class="terminal {% if lg_ok %}ok{% else %}bad{% endif %}">{{ lg_result }}</pre>
  {% endif %}
</section>
{% endblock %}
