<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Authenticate with Kioubit.dn42</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="/static/kioubit-auth-button.js"></script>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="centered">
  <div id="ui" class="panel narrow">
    <h1>Telegram Verification</h1>
    <kioubit-auth-btn return="{{ return_url }}" token="{{ token }}"></kioubit-auth-btn>
  </div>
  <div id="loader" class="panel narrow hidden">
    <p>Sending data back to bot...</p>
  </div>
  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('params')) {
      document.getElementById('ui').style.display = 'none';
      document.getElementById('loader').style.display = 'block';
      const result = {};
      urlParams.forEach((value, key) => result[key] = value);
      tg.sendData(JSON.stringify(result));
    }
  </script>
</body>
</html>
